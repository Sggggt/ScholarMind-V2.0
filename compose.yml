services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: sqlite+aiosqlite:////data/research.db
      REDIS_URL: redis://redis:6379/0
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
      PIP_CACHE_DIR: /root/.cache/pip
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      AIDE_PYTHON: /opt/.venv-aide-py311/bin/python
      AIDER_PYTHON: /opt/.venv-aider-py311/bin/python
      DOCKER_SHARED_WORKDIR_ROOT: /host-project-root
      DOCKER_SHARED_WORKDIR_MARKER: Project
      HOST_WORKDIR_ROOT: ${HOST_WORKDIR_ROOT:-}
      CONTAINER_WORKDIR_ROOT: ${CONTAINER_WORKDIR_ROOT:-/external-workdir}
      HOST_LAN_IPS: ${HOST_LAN_IPS:-}
      MDNS_ENABLED: "false"
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ..:/host-project-root
      - "${HOST_WORKDIR_ROOT:-./tmp/docker-custom-workdir}:${CONTAINER_WORKDIR_ROOT:-/external-workdir}"
      - backend_db:/data
      - pip_cache:/root/.cache/pip
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: sh -lc "if [ ! -f /data/research.db ] && [ -f /app/research.db ]; then cp /app/research.db /data/research.db; fi; exec env -u PIP_NO_CACHE_DIR python -m uvicorn main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./react-client
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE: /api
      VITE_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./react-client:/app
      - react_client_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  mobile-apk:
    profiles: ["mobile"]
    build:
      context: ./mobile
      dockerfile: Dockerfile.apk
    environment:
      APK_OUT_DIR: /out
      NODE_ENV: production
    volumes:
      - ./tmp/mobile-apk-out:/out
    command: []

volumes:
  react_client_node_modules:
  backend_db:
  pip_cache:
